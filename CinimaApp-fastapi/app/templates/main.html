<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="static/css/main.css">
	<link rel="stylesheet" type="text/css" href="static/css/header.css">
	<link rel="stylesheet" type="text/css" href="static/css/footer.css">
	<link rel="shortcut icon" href="static/icong_web.svg">
	<title>Главная страница</title>
</head>
<body>
	<div id="header">{% include "header.html"%}</div>
		<div class="mini_film  df">
			{% for film in films %}
			<div class="mini_bloc_film df">
				<a href="{profiles.html}" id="film"><img src="static/{{film.path_image}}"></a>
				<p id = titel>{{film.title}}</p>
				<p>{{film.avg_rating}}</p>
			</div>	
			{% endfor  %}
		</div>
	
	
	{% for film in films %}
		<div class="bloc_film df ">
			<a href="" id="film"><img src="static/{{film.path_image}}"></a>
			<div class="text_dect df">
				<h1>
					{{film.title}}
				</h1>
				<p>
					{{film.description}}
				</p>
				<p>{{film.avg_rating}}</p>
				
			</div>
		</div>
	{% endfor %}
	<div id="footer">{% include"footer.html"%}</div>
		
	
	
</body>
</html>
