<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="../static/css/log.css">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.6.0/css/all.css">
	<title>Вход </title>
</head>
<body>
	<div class="wrapper">
		<h1>Loging</h1>
		<form action="{{url_for("get_user_login_password")}}" method="post">
			<div class="input_box">
				<i class="fa-solid fa-user"></i>
				<input type="email"  name = "email"placeholder="Почта пользователя">
				
			</div>
			<div class="input_box">
				<i class="fa-solid fa-key"></i>
				<input type="password" name ="password"placeholder="Пароль">
				
			</div>
		<div class="button_a">
				<button type ="submit" class="btn">Войти</button>
				<a href="{{url_for("reg")}}">Регестрация</a>
			</div>
			
		</form>
		{%if err%}
		<p>{{err}}</p>
		{%endif%}
		
	</div>	

</body>

</html>
